<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #191919; font-family: 'JetBrains Mono', monospace; width: 100%; overflow: hidden; }
  body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .bar { background: #FFB347; border-radius: 10px; padding: 9px 16px; display: flex; justify-content: space-between; align-items: center; }
  .bar-title { font-size: 10px; font-weight: 800; color: #7A3000; letter-spacing: 0.08em; }
  .bar-badge { font-size: 8px; font-weight: 800; background: rgba(0,0,0,0.15); color: #7A3000; padding: 2px 9px; border-radius: 20px; letter-spacing: 0.08em; }
  .res-card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 10px; padding: 10px 13px; display: flex; align-items: center; gap: 10px; text-decoration: none; transition: background 0.15s, border-color 0.15s; }
  .res-card:hover { background: #242424; border-color: #3a2a1a; }
  .res-card.dashed { border-style: dashed; cursor: default; justify-content: center; }
  .res-icon { font-size: 16px; flex-shrink: 0; width: 24px; text-align: center; }
  .res-info { flex: 1; min-width: 0; }
  .res-name { font-size: 11px; font-weight: 800; color: #fff; margin-bottom: 2px; }
  .res-desc { font-size: 9px; color: #555; font-weight: 600; line-height: 1.4; }
  .res-tag { font-size: 8px; font-weight: 800; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; letter-spacing: 0.06em; background: rgba(255,183,71,0.12); color: #FFB347; border: 1px solid rgba(255,183,71,0.25); }
  .add-btn {
    background: #1e1e1e; border: 1.5px dashed #2a2a2a; border-radius: 10px;
    padding: 10px; display: flex; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
    color: #333; font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    transition: border-color 0.15s;
  }
  .add-btn:hover { border-color: #FFB347; color: #FFB347; }
</style>
</head>
<body>
  <div class="bar">
    <div class="bar-title">🎮 Games</div>
    <div class="bar-badge">learn by playing</div>
  </div>

  <a class="res-card" href="https://www.pbs.org/wgbh/nova/labs/lab/cyber/" target="_blank">
    <div class="res-icon">🧪</div>
    <div class="res-info">
      <div class="res-name">NOVA Cyber Lab (PBS)</div>
      <div class="res-desc">Cybersecurity game · learn by playing · free</div>
    </div>
    <div class="res-tag">GAME</div>
  </a>

  <div class="add-btn">+ more games coming soon</div>
</body>
</html>
